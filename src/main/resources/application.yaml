server:
  servlet:
    context-path: /${REPO_NAME}
spring:
  security:
    oauth2:
      authorizationserver:
        client:
          oidc-client:
            registration:
              client-id: "oidc-client"
              client-authentication-methods:
                - "none"
                - "client_secret_basic"
                - "client_secret_post"
              authorization-grant-types:
                - "authorization_code"
                - "refresh_token"
                - "client_credentials"
              redirect-uris:
                - "http://${DOMAIN_NAME}/login/oauth2/code/oidc-client"
              post-logout-redirect-uris:
                - "http://${DOMAIN_NAME}/"
              scopes:
                - "openid"
                - "profile"
                - "email"
                - "client.create"
                - "client.read"
            require-authorization-consent: true
            token:
              access-token-time-to-live: 7d
              refresh-token-time-to-live: 30d
              reuse-refresh-tokens: false
              authorization-code-time-to-live: 7d
              device-code-time-to-live: 7d
  datasource:
    url: ${DATABASE_URL}
    username: ${AWS_RDS_SECRET_NAME:${DATABASE_USERNAME}}
    password: ${DATABASE_PASSWORD}
    driver-class-name: ${DATABASE_DRIVER:com.amazonaws.secretsmanager.sql.AWSSecretsManagerPostgreSQLDriver}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create